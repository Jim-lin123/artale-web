<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理頁</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: #111827;
        }

        .wrap {
            max-width: 1000px;
            margin: 20px auto;
            background: #fff;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
        }

        .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .card {
            background: #f9fafb;
            border-radius: 14px;
            padding: 14px 16px;
            min-width: 160px;
            border: 1px solid #e5e7eb;
        }

        .room {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
            background: #fcfcfd;
        }

        .room-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .players {
            margin-top: 12px;
            display: grid;
            gap: 10px;
        }

        .player {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 10px 12px;
            border-radius: 12px;
            background: #f9fafb;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            color: white;
            cursor: pointer;
        }

        .red { background: #dc2626; }
        .gray { background: #6b7280; }

        .empty {
            color: #6b7280;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>管理頁</h1>

        <div class="stats">
            <div class="card">在線人數：<b id="totalOnline">0</b></div>
            <div class="card">房間數：<b id="roomCount">0</b></div>
            <div class="card"><button class="red" onclick="kickAll()">踢全部</button></div>
        </div>

        <div id="rooms"></div>
    </div>

    <script>
        const ADMIN_KEY = new URLSearchParams(location.search).get("key") || "";

        async function loadAdminData() {
            const res = await fetch(`/admin-data?key=${encodeURIComponent(ADMIN_KEY)}`);
            if (!res.ok) {
                document.body.innerHTML = "<h2 style='padding:20px;'>無權限</h2>";
                return;
            }

            const data = await res.json();
            document.getElementById("totalOnline").textContent = data.total_online;
            document.getElementById("roomCount").textContent = data.room_count;

            const wrap = document.getElementById("rooms");
            wrap.innerHTML = "";

            if (!data.rooms.length) {
                wrap.innerHTML = "<div class='empty'>目前沒有人在線</div>";
                return;
            }

            data.rooms.forEach(room => {
                const roomDiv = document.createElement("div");
                roomDiv.className = "room";

                const roomHead = document.createElement("div");
                roomHead.className = "room-head";
                roomHead.innerHTML = `
                    <div>
                        <b>房間：${room.room_id}</b>　
                        <span>人數：${room.count}</span>
                    </div>
                    <div>
                        <button class="gray" onclick="kickRoom('${room.room_id}')">踢整房</button>
                    </div>
                `;
                roomDiv.appendChild(roomHead);

                const playersDiv = document.createElement("div");
                playersDiv.className = "players";

                room.players.forEach(p => {
                    const playerDiv = document.createElement("div");
                    playerDiv.className = "player";
                    playerDiv.innerHTML = `
                        <div class="left">
                            <span class="dot" style="background:${p.color};"></span>
                            <span>${p.name}</span>
                            ${p.is_host ? "<b>［房主］</b>" : ""}
                            <small>${p.client_id}</small>
                        </div>
                        <div>
                            <button class="red" onclick="kickUser('${p.client_id}')">踢人</button>
                        </div>
                    `;
                    playersDiv.appendChild(playerDiv);
                });

                roomDiv.appendChild(playersDiv);
                wrap.appendChild(roomDiv);
            });
        }

        async function kickUser(clientId) {
            if (!confirm("確定踢這個人？")) return;

            await fetch(`/admin-kick?key=${encodeURIComponent(ADMIN_KEY)}&client_id=${encodeURIComponent(clientId)}`, {
                method: "POST"
            });

            loadAdminData();
        }

        async function kickRoom(roomId) {
            if (!confirm("確定踢掉整個房間？")) return;

            await fetch(`/admin-kick-room?key=${encodeURIComponent(ADMIN_KEY)}&room_id=${encodeURIComponent(roomId)}`, {
                method: "POST"
            });

            loadAdminData();
        }

        async function kickAll() {
            if (!confirm("確定踢掉全部在線玩家？")) return;

            await fetch(`/admin-kick-all?key=${encodeURIComponent(ADMIN_KEY)}`, {
                method: "POST"
            });

            loadAdminData();
        }

        loadAdminData();
        setInterval(loadAdminData, 3000);
    </script>
</body>
</html>
